<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:420px; background:#fff; border-radius:14px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h1 { margin:0 0 18px; font-size:22px; }
    label { display:block; margin:12px 0 6px; font-size:14px; color:#333; }
    input { width:100%; padding:12px 12px; border:1px solid #d9dde7; border-radius:10px; font-size:14px; outline:none; }
    input:focus { border-color:#7aa7ff; box-shadow:0 0 0 3px rgba(122,167,255,.25); }
    button { width:100%; margin-top:16px; padding:12px; border:0; border-radius:10px; font-size:15px; cursor:pointer; background:#2f6bff; color:#fff; }
    button:hover { filter: brightness(0.95); }
    .hint { margin-top:14px; font-size:12px; color:#6b7280; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="text-align: center;">Entrar</h1>

      <form method="POST" action="/login">
        <label for="usuario">Usuário</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Digite seu usuário"
          autocomplete="username"
          required
        />

        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        />
        {% if error %}
          <p style="color:#b42318; font-size:13px; margin-top:8px;">{{ error }}</p>
        {% endif %}
        <button type="submit">Entrar</button>
      </form>

      <div class="hint">Acesso restrito</div>
    </div>
  </div>
</body>
</html>
